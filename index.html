<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

button {
  padding: 15px;
  margin: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

#ownerPanel {
  display: none;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🔥 Quiz App</h2>

<button onclick="startTest()">🎯 Start Test</button>
<button onclick="loadLeaderboard()">🏆 Leaderboard</button>

<div id="quiz"></div>

<div id="ownerPanel">
  <h3>👑 Owner Panel</h3>
  <input type="file" id="pdf"><br><br>
  <input type="text" id="subject" placeholder="Subject"><br><br>
  <button onclick="uploadPDF()">📄 Upload PDF</button>
</div>

<script>

let BASE_URL = "https://quiz-mini-app-mh5e.onrender.com";
let OWNER_ID = 6446087354;

let user = null;

// 🧠 WAIT until page loads (IMPORTANT FIX)
window.onload = function(){

  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe) {
      user = Telegram.WebApp.initDataUnsafe.user;
  }

  console.log("User:", user);

  let panel = document.getElementById("ownerPanel");

  if(panel){
    if(user && user.id == OWNER_ID){
        panel.style.display = "block";
    }else{
        // TEMP DEBUG (force show)
        panel.style.display = "block";
    }
  }

};

// 📄 Upload
async function uploadPDF(){

  let file = document.getElementById("pdf").files[0];
  let subject = document.getElementById("subject").value;

  if(!file || !subject){
    alert("File + Subject डालो");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);

  await fetch(BASE_URL + "/upload?subject="+subject+"&user_id="+(user ? user.id : OWNER_ID),{
    method:"POST",
    body: formData
  });

  alert("✅ Uploaded");
}

// 🎯 Quiz
async function startTest(){

  let subject = prompt("Enter Subject");

  let res = await fetch(BASE_URL + "/quiz?subject="+subject);
  let data = await res.json();

  if(data.length == 0){
    alert("No Questions Found");
    return;
  }

  let i = 0;
  let score = 0;

  function showQ(){

    if(i >= data.length){
      fetch(BASE_URL + "/score?user_id="+(user ? user.id : 0)+"&score="+score,{method:"POST"});
      document.getElementById("quiz").innerHTML = "🎉 Score: "+score;
      return;
    }

    let q = data[i];
    let options = JSON.parse(q[2]);

    let html = `<h3>${q[1]}</h3>`;

    options.forEach((opt, index)=>{
      html += `<button onclick="check('${String.fromCharCode(65+index)}')">${opt}</button>`;
    });

    document.getElementById("quiz").innerHTML = html;
  }

  window.check = function(ans){
    if(ans == data[i][3]) score++;
    i++;
    showQ();
  }

  showQ();
}

// 🏆 Leaderboard
async function loadLeaderboard(){

  let res = await fetch(BASE_URL + "/leaderboard");
  let data = await res.json();

  let html = "<h3>🏆 Leaderboard</h3>";

  data.forEach(d=>{
    html += `<p>User ${d[0]} - ${d[1]}</p>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

</script>

</body>
</html>
