<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz App</title>
</head>

<body>

<h2>🔥 Quiz App</h2>

<button onclick="startTest()">🎯 Quiz</button>
<button onclick="startExam()">📝 Exam</button>
<button onclick="loadLeaderboard()">🏆 Leaderboard</button>

<div id="quiz"></div>
<div id="exam"></div>

<script>

let BASE_URL = "https://quiz-mini-app-mh5e.onrender.com";
let OWNER_ID = 6446087354;

let user = Telegram.WebApp?.initDataUnsafe?.user || null;

// OLD QUIZ
async function startTest(){
  let subject = prompt("Subject");
  let res = await fetch(BASE_URL + "/quiz?subject="+subject);
  let data = await res.json();
  alert("Questions loaded: "+data.length);
}

// NEW EXAM
async function startExam(){

  let subject = prompt("Subject");

  let res = await fetch(BASE_URL + "/exam?subject="+subject);
  let data = await res.json();

  let html = `<iframe src="${BASE_URL}/${data.pdf}" width="100%" height="300"></iframe>`;

  let answers = {};

  for(let i=1;i<=data.total;i++){
    html += `<p>Q${i}</p>`;
    ["A","B","C","D"].forEach(opt=>{
      html += `<button onclick="selectAns(${i},'${opt}')">${opt}</button>`;
    });
  }

  html += `<button onclick="submitExam()">Submit</button>`;

  document.getElementById("exam").innerHTML = html;

  window.selectAns = (q,a)=>answers[q]=a;

  window.submitExam = async ()=>{
    let res = await fetch(BASE_URL + "/submit?subject="+subject,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(answers)
    });

    let result = await res.json();
    alert("Score: "+result.score);
  }
}

// LEADERBOARD
async function loadLeaderboard(){
  let res = await fetch(BASE_URL + "/leaderboard");
  let data = await res.json();
  alert(JSON.stringify(data));
}

</script>

</body>
</html>
